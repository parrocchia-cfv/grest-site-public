# Pubblica apps/public su GitHub Pages (export statico → cartella out).
#
# Supporta due layout:
# - Monorepo: package.json con "workspaces" → build con --workspace=apps/public
# - Repo solo pubblico: cartella apps/public senza workspaces in root → build dentro apps/public
#
# Primo utilizzo:
# 1. Repo → Settings → Pages → Source: "GitHub Actions".
# 2. Secret NEXT_PUBLIC_API_URL (base URL backend, senza slash finale).
# 3. DNS / CNAME come da doc GitHub per il dominio custom.

name: Deploy public site to GitHub Pages

on:
  push:
    branches: [main, master, develop, production]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # cache: npm richiede package-lock in root → non usare
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify NEXT_PUBLIC_API_URL secret
        run: |
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            echo "::error::Aggiungi il secret del repository NEXT_PUBLIC_API_URL (Settings → Secrets → Actions)."
            exit 1
          fi
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Install, build, set Pages output path
        run: |
          set -e
          npm_install() {
            if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
              npm ci
            else
              npm install
            fi
          }

          if [ -f package.json ] && grep -q '"workspaces"' package.json; then
            echo "Build: monorepo (npm workspaces)"
            npm_install
            npm run build --workspace=apps/public
            echo "PAGES_OUT=apps/public/out" >> "$GITHUB_ENV"
          elif [ -f apps/public/package.json ]; then
            echo "Build: apps/public senza workspaces in root (repo grest-site-public tipico)"
            cd apps/public
            npm_install
            npm run build
            echo "PAGES_OUT=apps/public/out" >> "$GITHUB_ENV"
          else
            echo "Build: Next nella root del repo"
            npm_install
            npm run build
            echo "PAGES_OUT=out" >> "$GITHUB_ENV"
          fi
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_OUT }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
